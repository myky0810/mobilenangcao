name: doan_cuoiki
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  carousel_slider: ^5.0.0
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  sqflite: ^2.4.2
  path: ^1.9.1
  crypto: ^3.0.7
